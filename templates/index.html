<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Media URL Capture GUI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;1,9..144,400&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #3a2f26;
      --paper: #faf6ee;
      --paper-edge: #e8dfd0;
      --kraft: #c9a882;
      --terracotta: #c46852;
      --terracotta-dark: #9e503e;
      --sage: #6b8f71;
      --sage-soft: rgba(107, 143, 113, 0.25);
      --mustard: #d9a441;
      --cream-shadow: rgba(58, 47, 38, 0.14);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 28px 20px 48px;
      font-family: 'Nunito', system-ui, sans-serif;
      font-size: 16px;
      line-height: 1.55;
      color: var(--ink);
      background-color: #ddd2c4;
      background-image:
        radial-gradient(circle at 1px 1px, rgba(90, 72, 58, 0.12) 1px, transparent 0);
      background-size: 28px 28px;
    }

    .card {
      max-width: 1000px;
      margin: 0 auto;
      padding: 28px 32px 36px;
      background:
        linear-gradient(145deg, var(--paper) 0%, #f3ebe0 52%, var(--paper-edge) 100%);
      border: 3px dashed var(--kraft);
      border-radius: 12px 20px 16px 18px / 18px 14px 22px 12px;
      box-shadow:
        6px 6px 0 var(--cream-shadow),
        12px 12px 32px rgba(58, 47, 38, 0.08),
        inset 0 1px 0 rgba(255, 255, 255, 0.65);
    }

    .card-header {
      margin-bottom: 22px;
      padding-bottom: 18px;
      border-bottom: 3px dotted var(--sage-soft);
    }

    h1 {
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 500;
      font-size: 1.85rem;
      letter-spacing: 0.01em;
      margin: 0 0 8px;
      color: var(--ink);
      line-height: 1.25;
    }

    .subtitle {
      margin: 0;
      font-size: 1.02rem;
      color: #5c5046;
      max-width: 52ch;
    }

    h2 {
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 500;
      font-size: 1.25rem;
      margin: 28px 0 10px;
      color: var(--terracotta-dark);
      display: inline-block;
      padding-bottom: 4px;
      border-bottom: 2px solid color-mix(in srgb, var(--mustard) 55%, transparent);
    }

    label {
      display: block;
      font-weight: 700;
      margin-top: 16px;
      font-size: 0.93rem;
      color: var(--ink);
      letter-spacing: 0.02em;
    }

    input {
      width: 100%;
      margin-top: 8px;
      padding: 12px 14px;
      font-family: inherit;
      font-size: 1rem;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.72);
      border: 2px solid color-mix(in srgb, var(--kraft) 65%, transparent);
      border-radius: 10px 6px 10px 6px;
      box-shadow: inset 0 2px 4px rgba(58, 47, 38, 0.06);
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    input:focus {
      outline: none;
      border-color: var(--sage);
      box-shadow:
        inset 0 2px 4px rgba(58, 47, 38, 0.06),
        0 0 0 3px var(--sage-soft);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    button {
      margin-top: 20px;
      padding: 12px 22px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      cursor: pointer;
      color: var(--paper);
      background: linear-gradient(165deg, var(--terracotta) 0%, var(--terracotta-dark) 100%);
      border: 3px solid var(--ink);
      border-radius: 255px 18px 240px 18px / 20px 255px 16px 240px;
      box-shadow: 4px 4px 0 var(--ink);
      transition: transform 0.08s ease, box-shadow 0.08s ease;
    }

    button:hover:not(:disabled) {
      transform: translate(1px, 1px);
      box-shadow: 3px 3px 0 var(--ink);
    }

    button:active:not(:disabled) {
      transform: translate(3px, 3px);
      box-shadow: 1px 1px 0 var(--ink);
    }

    button.secondary {
      margin-top: 12px;
      color: var(--ink);
      background: linear-gradient(165deg, #f4e9c9 0%, var(--mustard) 120%);
      border-color: color-mix(in srgb, var(--ink) 75%, transparent);
      box-shadow: 3px 3px 0 color-mix(in srgb, var(--ink) 55%, transparent);
    }

    button.secondary:hover:not(:disabled) {
      box-shadow: 2px 2px 0 color-mix(in srgb, var(--ink) 55%, transparent);
    }

    button.secondary:active:not(:disabled) {
      box-shadow: 1px 1px 0 color-mix(in srgb, var(--ink) 55%, transparent);
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
      box-shadow: 4px 4px 0 var(--ink);
    }

    .status {
      margin-top: 20px;
      padding: 10px 14px;
      font-weight: 700;
      background: rgba(255, 255, 255, 0.5);
      border-left: 4px solid var(--sage);
      border-radius: 0 10px 10px 0;
    }

    textarea {
      width: 100%;
      min-height: 180px;
      margin-top: 6px;
      padding: 14px;
      font-family: ui-monospace, 'Cascadia Code', 'Consolas', monospace;
      font-size: 13px;
      line-height: 1.45;
      color: #2a2824;
      background-color: #fffcf5;
      background-image:
        linear-gradient(transparent 1.42em, rgba(210, 195, 170, 0.35) 1.43em);
      background-size: 100% 1.43em;
      border: 2px dashed color-mix(in srgb, var(--kraft) 70%, transparent);
      border-radius: 8px 12px;
      resize: vertical;
    }

    textarea:focus {
      outline: none;
      border-color: var(--sage);
      box-shadow: 0 0 0 3px var(--sage-soft);
    }

    pre {
      white-space: pre-wrap;
      margin-top: 6px;
      padding: 16px;
      max-height: 260px;
      overflow: auto;
      font-family: ui-monospace, 'Cascadia Code', 'Consolas', monospace;
      font-size: 12px;
      line-height: 1.45;
      color: #ebe4d9;
      background: #3a362f;
      border: 3px dashed color-mix(in srgb, var(--sage) 45%, #3a362f);
      border-radius: 10px;
      box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.2);
    }

    .hint {
      margin-top: 8px;
      font-size: 0.9rem;
      color: #5c5348;
      font-style: italic;
    }

    @media (max-width: 680px) {
      .row { grid-template-columns: 1fr; }
      .card { padding: 22px 20px 28px; }
      h1 { font-size: 1.55rem; }
    }
  </style>
</head>
<body>
  <div class="card">
    <header class="card-header">
      <h1>Media URL Capture Studio</h1>
      <p class="subtitle">Open a cozy Chrome window, sign in if you need to, press play — we’ll collect the stream links that pass through while the video runs.</p>
    </header>

    <label for="url">Page URL</label>
    <input id="url" placeholder="https://...">

    <label for="profile_dir">Browser profile directory</label>
    <input id="profile_dir" value=".playwright_profile">
    <div class="hint">Use the same profile folder every time if you want cookies/login state to persist.</div>

    <div class="row">
      <div>
        <label for="wait_before_capture">Wait before capture (seconds)</label>
        <input id="wait_before_capture" type="number" value="15" min="0">
      </div>
      <div>
        <label for="timeout_seconds">Capture duration (seconds)</label>
        <input id="timeout_seconds" type="number" value="45" min="1">
      </div>
    </div>

    <button id="startBtn" type="button" onclick="startCapture()">Launch browser &amp; capture</button>

    <div class="status" id="status">Status: idle</div>

    <h2>Captured URLs</h2>
    <textarea id="urls" readonly></textarea>
    <button type="button" class="secondary" onclick="copyUrls()">Copy URLs to clipboard</button>

    <h2>Logs</h2>
    <pre id="logs"></pre>
  </div>

<script>
let currentJobId = null;
let pollTimer = null;

function resetCaptureUi() {
  if (pollTimer != null) {
    clearInterval(pollTimer);
    pollTimer = null;
  }
  document.getElementById('startBtn').disabled = false;
}

async function startCapture() {
  const urlInput = document.getElementById('url');
  urlInput.value = urlInput.value.trim();
  const url = urlInput.value;
  if (!url) {
    document.getElementById('status').textContent =
      'Status: error — enter a page URL first (streaming page to open in Chrome)';
    return;
  }

  if (pollTimer != null) {
    clearInterval(pollTimer);
    pollTimer = null;
  }
  currentJobId = null;

  const startBtn = document.getElementById('startBtn');
  startBtn.disabled = true;
  document.getElementById('status').textContent = 'Status: starting';
  document.getElementById('logs').textContent = '';
  document.getElementById('urls').value = '';

  const payload = {
    url,
    profile_dir: document.getElementById('profile_dir').value,
    wait_before_capture: Number(document.getElementById('wait_before_capture').value),
    timeout_seconds: Number(document.getElementById('timeout_seconds').value)
  };

  try {
    const res = await fetch('/start', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload)
    });

    let data = null;
    try {
      data = await res.json();
    } catch {
      resetCaptureUi();
      document.getElementById('status').textContent =
        `Status: error — non-JSON response from server (${res.status})`;
      return;
    }

    if (!res.ok) {
      resetCaptureUi();
      const msg = typeof data?.error === 'string' ? data.error : (`HTTP ${res.status}`);
      document.getElementById('status').textContent = 'Status: error — ' + msg;
      return;
    }

    if (!data.job_id) {
      resetCaptureUi();
      document.getElementById('status').textContent =
        'Status: error — server did not return a job id';
      return;
    }

    currentJobId = data.job_id;
    pollTimer = setInterval(pollStatus, 1000);
  } catch (e) {
    resetCaptureUi();
    document.getElementById('status').textContent =
      `Status: error — ${e instanceof Error ? e.message : String(e)}`;
  }
}

async function pollStatus() {
  if (!currentJobId) return;

  try {
    const res = await fetch('/status/' + currentJobId);

    let data = null;
    try {
      data = await res.json();
    } catch {
      resetCaptureUi();
      currentJobId = null;
      document.getElementById('status').textContent =
        `Status: error — invalid JSON from /status (${res.status})`;
      return;
    }

    if (!res.ok) {
      resetCaptureUi();
      currentJobId = null;
      const msg = typeof data?.error === 'string' ? data.error : (`HTTP ${res.status}`);
      document.getElementById('status').textContent = 'Status: error — ' + msg;
      return;
    }

    document.getElementById('status').textContent = 'Status: ' + data.status;
    document.getElementById('logs').textContent = (data.logs || []).join('\n');
    document.getElementById('urls').value = (data.urls || []).join('\n');

    if (data.error) {
      document.getElementById('logs').textContent += '\nERROR: ' + data.error;
    }

    if (data.status === 'complete' || data.status === 'error') {
      resetCaptureUi();
      currentJobId = null;
    }
  } catch (e) {
    resetCaptureUi();
    currentJobId = null;
    document.getElementById('status').textContent =
      `Status: error — poll failed: ${e instanceof Error ? e.message : String(e)}`;
  }
}

async function copyUrls() {
  const text = document.getElementById('urls').value;
  try {
    await navigator.clipboard.writeText(text);
  } catch (e) {
    document.getElementById('status').textContent =
      `Status: clipboard failed — ${e instanceof Error ? e.message : String(e)} (select URLs and copy manually)`;
  }
}
</script>
</body>
</html>
